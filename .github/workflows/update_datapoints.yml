name: Update datapoints artifacts

on:
  push:
    branches:
      - '**'
    paths:
      - 'src/open3e/Open3Edatapoints.py'
      - 'src/open3e/Open3EdatapointsVariants.py'
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install package
        run: pip install .

      - name: Generate JSON artifacts
        run: open3e_dids2json --path src/open3e

      - name: Generate Markdown artifact
        run: open3e_dids2md --filename src/open3e/Open3Edatapoints.md

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/open3e/Open3Edatapoints.json \
                  src/open3e/Open3EdatapointsVariants.json \
                  src/open3e/Open3Edatapoints.md
          if git diff --cached --quiet; then
            echo "No changes — skipping commit"
          else
            git commit -m "Updated datapoints json and md accordingly"
            git push
          fi
